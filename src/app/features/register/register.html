<div class="header-logo-container">
  <img src="/LogoCibertec.png" alt="Logo Cibertec" class="header-logo">
</div>

<div class="register-container">
  <form (submit)="onRegister()">
    <h2>Crear Cuenta</h2>
    
    <div class="row">
      <div class="field-group">
        <label>Nombre</label>
        <input [(ngModel)]="usuario.nombreUsuario" name="nombre" placeholder="Ej. Juan" required>
      </div>
      <div class="field-group">
        <label>Apellido</label>
        <input [(ngModel)]="usuario.apellidoUsuario" name="apellido" placeholder="Ej. Pérez" required>
      </div>
    </div>
    
    <label>Correo Institucional</label>
    <input [(ngModel)]="usuario.correoInstitucional" name="correo" placeholder="ejemplo@cibertec.edu.pe" required>
    
    <label>Código de Alumno</label>
    <input [(ngModel)]="usuario.codigoInstitucional" name="codigo" placeholder="Ej. A20261234" required>
    
    <div class="row">
      <div class="field-group">
        <label>Sede</label>
        <select [(ngModel)]="usuario.sede.idSede" name="sede" required>
          <option [value]="0" disabled>Seleccionar...</option>
          <option *ngFor="let sede of listaSedes" [value]="sede.idSede">{{ sede.nombreSede }}</option>
        </select>
      </div>
      <div class="field-group">
        <label>Carrera</label>
        <select [(ngModel)]="usuario.carrera.idCarrera" name="carrera" required>
          <option [value]="0" disabled>Seleccionar...</option>
          <option *ngFor="let carrera of listaCarreras" [value]="carrera.idCarrera">{{ carrera.nombreCarrera }}</option>
        </select>
      </div>
    </div>

    <label>Contraseña</label>
    <div class="password-container">
      <input [type]="hidePassword ? 'password' : 'text'" [(ngModel)]="usuario.contrasena" name="pass" placeholder="********" required>
      <button type="button" class="toggle-btn" (click)="togglePassword()">
        <i class="fas" [ngClass]="hidePassword ? 'fa-eye' : 'fa-eye-slash'"></i>
      </button>
    </div>

    <button type="submit" class="btn-submit">Registrarse</button>
    <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
  </form>
</div>
