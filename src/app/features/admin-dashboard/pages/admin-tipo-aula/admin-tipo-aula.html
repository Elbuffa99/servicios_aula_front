<div class="aulas-container">
  <div class="header-actions">
    <h2>Gestión de Tipos de Aula</h2>
    <div class="header-controls">
      <input type="text" placeholder="Buscar..." [(ngModel)]="filtroBusqueda" (input)="onBusquedaChange()">
      <button class="btn-primary" (click)="abrir()">+ Nuevo Tipo</button>
    </div>
  </div>

  <div class="table-responsive">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Descripción</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of paginados">
          <td>{{ t.idTipoAula }}</td>
          <td>{{ t.descripcion }}</td>
          <td>
            <button class="btn-icon" (click)="abrir(t)"><i class="fas fa-edit" style="color: #004a99;"></i></button>
            <button class="btn-icon" (click)="eliminar(t.idTipoAula!)"><i class="fas fa-trash" style="color: #d33;"></i></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  
  <div class="pagination">
    <button class="btn-page" [disabled]="paginaActual === 1" (click)="paginaActual = paginaActual - 1">Anterior</button>
    <span>Página {{ paginaActual }}</span>
    <button class="btn-page" [disabled]="paginados.length < itemsPorPagina" (click)="paginaActual = paginaActual + 1">Siguiente</button>
  </div>
</div>

<div class="modal-overlay" *ngIf="mostrarModal">
  <div class="modal-content">
    <h3>{{ form.idTipoAula ? 'Editar' : 'Nuevo' }} Tipo de Aula</h3>
    <form (ngSubmit)="guardar()">
      <div class="form-group">
        <label>Descripción</label>
        <input type="text" [(ngModel)]="form.descripcion" name="descripcion" required>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancelar" (click)="mostrarModal = false">Cancelar</button>
        <button type="submit" class="btn-guardar" [disabled]="procesando">Guardar</button>
      </div>
    </form>
  </div>
</div>
