<div class="header-logo-container">
  <img src="/LogoCibertec.png" alt="Logo Cibertec" class="header-logo">
</div>
<div class="login-container">
  <form (submit)="onLogin()">
    <h2>Bienvenido de nuevo</h2>
    
    <label>CORREO INSTITUCIONAL</label>
    <input type="email" [(ngModel)]="loginData.correoInstitucional" name="email" placeholder="ejemplo@cibertec.edu.pe" required>
    
    <label>CONTRASEÑA</label>
    <div class="password-container">
      <input [type]="hidePassword ? 'password' : 'text'" [(ngModel)]="loginData.contrasena" name="password" placeholder="********" required>
      <button type="button" class="toggle-btn" (click)="togglePassword()">
        <i class="fas" [ngClass]="hidePassword ? 'fa-eye' : 'fa-eye-slash'"></i>
      </button>
    </div>
    
    <button type="submit" class="btn-submit">Ingresar →</button>
    
    <p>¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a></p>
  </form>
</div>
